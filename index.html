<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ödemark — Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" crossorigin>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#fff;min-height:100vh;color:#3f3f3f}
a{color:inherit;text-decoration:none}

/* SHARED */
.pill{display:inline-flex;align-self:flex-start;align-items:center;border-radius:50px;padding:4px 12px;font-size:10px;font-weight:600;color:#3f3f3f;white-space:nowrap;width:fit-content}
.pill-gray{background:#eaeef1}
.pill-white{background:#fff}
hr.div{border:none;border-top:1px solid #e8e8e8;width:100%}

/* STATUS PILLS */
.sp{display:inline-flex;align-items:center;gap:4px;border-radius:50px;padding:2px 9px;font-size:10px;color:#3f3f3f;white-space:nowrap;cursor:pointer}
.sp-none{background:#eaeef1;color:#3f3f3f}
.sp-paid{background:#23ba67;color:#fff}
.sp-processing{background:#e3b128;color:#3f3f3f}

/* ── PROJECT LIST ── */
.pl{min-height:100vh;background:#f4f4f0}
.pl-topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;background:#fff;border-bottom:1px solid #e8e8e8}
.pl-logo{font-size:22px;font-weight:300;color:#3f3f3f;letter-spacing:-.5px}
.pl-dots{display:flex;gap:5px;cursor:pointer;align-items:center}
.pl-dot{width:14px;height:14px;border-radius:50%;background:#3f3f3f}
.pl-sq{width:14px;height:14px;background:#3f3f3f}
.pl-body{padding:32px 24px;max-width:900px;margin:0 auto}
.pl-heading{font-size:10px;font-weight:600;color:#b4b4b4;letter-spacing:.5px;text-transform:uppercase}
.pl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:16px}
.pl-card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:20px 22px;cursor:pointer;display:block}
.pl-card:hover{border-color:#3f3f3f}
.pl-card-name{font-size:17px;font-weight:400;color:#3f3f3f;margin-bottom:6px}
.pl-card-slug{font-size:11px;color:#b4b4b4;margin-bottom:14px}
.pl-card-badges{display:flex;gap:6px;flex-wrap:wrap}
.pl-card-badge{font-size:9px;background:#eaeef1;border-radius:50px;padding:2px 9px;color:#3f3f3f}

/* ── CLIENT LANDING ── */
.cl{background:#fff;min-height:100vh;display:flex;flex-direction:column}
.cl-hero{background:#eaeef1;padding:24px 16px 40px}
.cl-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:56px}
.cl-nav-logo{font-size:22px;font-weight:300;color:#3f3f3f;letter-spacing:-.5px}
.cl-nav-dots{display:flex;gap:5px;cursor:pointer;align-items:center}
.cl-nav-dot{width:14px;height:14px;border-radius:50%;background:#3f3f3f}
.cl-nav-sq{width:14px;height:14px;background:#3f3f3f}
.cl-hero-body{display:flex;flex-direction:column;gap:30px}
.cl-hero-title{font-size:36px;font-weight:300;color:#3f3f3f;line-height:1;letter-spacing:-.36px}
.cl-hero-desc{font-size:15px;color:#3f3f3f;line-height:1.5;letter-spacing:-.15px;margin-top:15px}
.cl-project-name{font-size:36px;font-weight:300;color:#3f3f3f;line-height:1;letter-spacing:-.36px;margin-top:18px}
.cl-links{padding:30px 16px;flex:1}
.cl-links-grid{display:flex;flex-direction:column;gap:30px;margin-top:30px}
.cl-link-item{display:flex;gap:4px;align-items:flex-start}
.cl-link-arrow{font-size:16px;color:#3f3f3f;flex-shrink:0;line-height:1.3}
.cl-link-name{font-size:16px;color:#3f3f3f;letter-spacing:-.16px;line-height:1.3}
.cl-link-name.clickable{text-decoration:underline;cursor:pointer}
.cl-link-sub{font-size:12px;color:#b4b4b4;letter-spacing:-.12px;margin-top:2px}
.cl-comm{background:#eaeef1;padding:30px 16px 60px}
.cl-comm-inner{margin-top:20px;display:flex;flex-direction:column;gap:30px}
.cl-comm-col-title{font-size:10px;font-weight:700;color:#3f3f3f;margin-bottom:15px}
.cl-comm-link{font-size:16px;color:#3f3f3f;text-decoration:underline;display:block}
.cl-comm-sub{font-size:9px;color:#b4b4b4;margin-top:2px}
.cl-contact-name{font-size:16px;color:#3f3f3f;line-height:1.3;margin-bottom:15px}
.cl-contact-links{display:flex;flex-direction:column;gap:6px;font-size:16px;color:#3f3f3f}
.cl-footer{background:#3f3f3f;padding:24px 16px}
.cl-footer-copy{font-size:12px;color:#eaeef1}
@media(min-width:768px){
  .cl-hero{padding:24px 24px 48px}
  .cl-hero-body{flex-direction:row;gap:30px}
  .cl-hero-left{flex:1}
  .cl-hero-right{flex:1}
  .cl-links{padding:30px 24px}
  .cl-links-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:30px}
  .cl-comm{padding:30px 24px 60px}
  .cl-comm-inner{flex-direction:row;gap:30px}
  .cl-comm-inner > div{flex:1}
  .cl-footer{padding:24px}
}

/* ── PAYMENT TRACKER ── */
.pt-wrap{display:flex;justify-content:center;min-height:100vh;background:#c8ccd0}
.pt{width:375px;min-width:375px;max-width:375px;min-height:100vh;background:#eaeef1}
.pt-header{background:#eaeef1;padding:20px}
.pt-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pt-logo{font-size:11px;color:#3f3f3f}
.pt-dots{display:flex;gap:4px;cursor:pointer;align-items:center}
.pt-dot{width:12px;height:12px;border-radius:50%;background:#3f3f3f}
.pt-sq{width:12px;height:12px;background:#3f3f3f}
.pt-back{font-size:11px;color:#b4b4b4;cursor:pointer;margin-bottom:12px;display:block}
.pt-back:hover{color:#3f3f3f}
.pt-title{font-size:28px;font-weight:300;color:#3f3f3f;line-height:1.14;letter-spacing:-.28px}
.pt-white{background:#fff;padding:20px}
.pt-section{margin-bottom:24px}
.pt-section:last-child{margin-bottom:0}
.pt-section-meta{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.pt-total-label{font-size:10px;color:#3f3f3f;margin-bottom:6px;text-align:right}
.pt-total-amt{font-size:16px;color:#3f3f3f;text-align:right}
.pt-table-hdr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:5px 0;font-size:10px;color:#b4b4b4}
.pt-rows{display:flex;flex-direction:column;gap:12px;padding:12px 0 0}
.pt-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:center}
.pt-row-label{font-size:10px;color:#3f3f3f}
.pt-row-amt{font-size:12px;color:#3f3f3f}
.pt-comm{background:#eaeef1;padding:20px}
.pt-comm-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
.pt-comm-title{font-size:6px;font-weight:700;color:#3f3f3f;margin-bottom:12px}
.pt-comm-link{font-size:12px;color:#3f3f3f;text-decoration:underline;display:block;margin-bottom:2px}
.pt-comm-sub{font-size:9px;color:#b4b4b4}
.pt-contact-name{font-size:12px;color:#3f3f3f;line-height:1.3;margin-bottom:12px}
.pt-contact-links{display:flex;flex-direction:column;gap:5px;font-size:9px;color:#3f3f3f}
.pt-contact-links a{color:#3f3f3f;text-decoration:underline}
.pt-footer{padding:16px 20px 24px;display:flex;justify-content:space-between;align-items:flex-end}
.pt-copy{font-size:12px;color:#3f3f3f}
.pt-fine{font-size:6px;font-weight:300;color:#b4b4b4;line-height:1.5;text-align:right}

/* ── ADMIN ── */
.ad{background:#f4f4f0;min-height:100vh;display:block;width:100%}
.ad-topbar{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10}
.ad-topbar-left{display:flex;align-items:center;gap:10px}
.ad-back-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#3f3f3f;padding:0;line-height:1}
.ad-title{font-size:13px;font-weight:600;color:#3f3f3f}
.ad-title span{font-weight:300}
.ad-preview-btn{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;color:#3f3f3f;background:#eaeef1;border:none;border-radius:50px;padding:5px 12px;cursor:pointer}
.ad-preview-btn:hover{background:#d8dce0}
.ad-logout{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:10px;color:#b4b4b4;background:none;border:none;cursor:pointer;text-decoration:underline}
.ad-body{padding:16px;width:100%;display:block}
.ad-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #e0e0e0}
.ad-card-title{font-size:10px;font-weight:600;color:#b4b4b4;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.ad-label{font-size:10px;color:#b4b4b4;margin-bottom:5px}
.ad-field{margin-bottom:12px}
.ad-field:last-child{margin-bottom:0}
.ad-input{width:100%;border:none;border-bottom:1px solid #d0d4d7;background:transparent;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:13px;color:#3f3f3f;padding:4px 0 6px}
.ad-input:focus{outline:none;border-bottom-color:#3f3f3f}
.ad-input-sm{border:none;border-bottom:1px solid #d0d4d7;background:transparent;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;color:#3f3f3f;padding:3px 0;width:100%}
.ad-input-sm:focus{outline:none;border-bottom-color:#3f3f3f}
.ad-textarea{width:100%;border:1px solid #d0d4d7;border-radius:6px;background:transparent;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;color:#3f3f3f;padding:8px;resize:none;line-height:1.5}
.ad-textarea:focus{outline:none;border-color:#3f3f3f}
.ad-slug-row{display:flex;align-items:center;background:#f4f4f0;border-radius:8px;padding:6px 10px;margin-top:4px}
.ad-slug-prefix{font-size:10px;color:#b4b4b4;white-space:nowrap;flex-shrink:0}
.ad-slug-inp{border:none;background:transparent;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:10px;color:#3f3f3f;flex:1;min-width:0}
.ad-slug-inp:focus{outline:none}
.sec-block{background:#fafafa;border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid #eee}
.sec-block-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pay-item{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #eee}
.pay-item:last-of-type{border-bottom:none;margin-bottom:4px;padding-bottom:0}
.del-btn{background:none;border:none;font-size:15px;color:#d0d4d7;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.del-btn:hover{color:#e24b4a}
.add-link-btn{background:none;border:none;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;color:#b4b4b4;cursor:pointer;padding:0;margin-top:4px;text-decoration:underline}
.add-link-btn:hover{color:#3f3f3f}
.link-card{background:#fff8f0;border:1px solid #ffe0c0;border-radius:10px;padding:14px;margin-bottom:12px}
.link-card-title{font-size:10px;font-weight:600;color:#e3a028;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.link-display{font-size:10px;color:#3f3f3f;word-break:break-all;line-height:1.6;background:#fff3e0;border-radius:6px;padding:7px 9px;font-family:monospace;margin-bottom:8px}
.copy-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;color:#3f3f3f;background:#fff;border:1px solid #e0d0b0;border-radius:50px;padding:7px;cursor:pointer}
.copy-btn:hover{background:#fff3e0}
.del-proj-btn{width:100%;background:none;border:1px solid #e24b4a;color:#e24b4a;border-radius:50px;padding:10px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;cursor:pointer}
.del-proj-btn:hover{background:#fff0f0}
.link-item-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #eee}
.link-item-row:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.btn-new{display:flex;align-items:center;gap:8px;background:#3f3f3f;color:#fff;border:none;border-radius:50px;padding:10px 18px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;font-weight:500;cursor:pointer;justify-content:center}
.btn-new:hover{background:#2a2a2a}
.section-lbl{font-size:10px;font-weight:600;color:#b4b4b4;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;background:#eaeef1;max-width:375px;margin:0 auto}
.login-logo{font-size:22px;font-weight:300;color:#3f3f3f;letter-spacing:-.5px;margin-bottom:48px;align-self:flex-start}
.login-title{font-size:22px;font-weight:300;color:#3f3f3f;letter-spacing:-.22px;margin-bottom:6px;align-self:flex-start}
.login-sub{font-size:12px;color:#b4b4b4;margin-bottom:36px;align-self:flex-start}
.login-label{font-size:10px;color:#b4b4b4;display:block;margin-bottom:6px;width:100%}
.login-input{width:100%;border:none;border-bottom:1px solid #c0c4c7;background:transparent;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:15px;color:#3f3f3f;padding:6px 0 10px}
.login-input:focus{outline:none;border-bottom-color:#3f3f3f}
.login-btn{width:100%;background:#3f3f3f;color:#fff;border:none;border-radius:50px;padding:13px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:13px;cursor:pointer;margin-top:20px}
.login-btn:hover{background:#2a2a2a}
.login-err{font-size:11px;color:#e24b4a;margin-top:8px;min-height:16px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:340px}
.modal h3{font-size:14px;font-weight:600;color:#3f3f3f;margin-bottom:16px}
.mfield{margin-bottom:11px}
.mfield label{font-size:10px;color:#b4b4b4;display:block;margin-bottom:4px}
.mfield input{width:100%;border:1px solid #d0d4d7;border-radius:8px;padding:8px 10px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:13px;color:#3f3f3f;background:#fafafa}
.mfield input:focus{outline:none;border-color:#3f3f3f}
.mslug-row{display:flex;align-items:center;background:#f4f4f0;border-radius:8px;padding:8px 10px}
.mslug-prefix{font-size:11px;color:#b4b4b4;white-space:nowrap;flex-shrink:0}
.mslug-inp{border:none;background:transparent;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;color:#3f3f3f;flex:1;min-width:0}
.mslug-inp:focus{outline:none}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:10px;border-radius:50px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;cursor:pointer;border:1px solid #d0d4d7;background:#eaeef1;color:#3f3f3f}
.mbtn-dark{background:#3f3f3f;color:#fff;border-color:#3f3f3f}
.merr{font-size:11px;color:#e24b4a;margin-top:4px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3f3f3f;color:#fff;font-size:12px;padding:8px 18px;border-radius:50px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app" style="min-height:100vh;background:#eaeef1"></div>
<div class="toast" id="toast"></div>
<script>
const BASE='https://project.tracker.odemark.co';
const SK='ch_v8';
const PASS='odemark2025';
const AUTH_KEY='ch_auth';

function isAuthed(){try{return localStorage.getItem(AUTH_KEY)==='1';}catch(e){return false;}}
function setAuth(){try{localStorage.setItem(AUTH_KEY,'1');}catch(e){}}
function clearAuth(){try{localStorage.removeItem(AUTH_KEY);}catch(e){}}
function load(){try{var s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch(e){return null;}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}

var DEF={projects:[{
  id:1,client:'Caucasus Holidays',slug:'caucasus-holidays',
  description:'This page will help you navigate through our collaboration.\nBelow you\'ll find all the key links and resources needed for the project.',
  links:[
    {id:1,label:'Figma Project File',sub:'Presentations and steps.',url:''},
    {id:2,label:'Legal Documents',sub:'Contracts, invoices.',url:''},
    {id:3,label:'Google Drive Folder',sub:'Deliverables & Assets',url:''},
    {id:4,label:'Payment Tracker',sub:'Payment processing and steps',url:'#pay'},
    {id:5,label:'Provided Materials',sub:'Briefs, photos, assets',url:''}
  ],
  communication:{whatsapp:'https://wa.me/qr/6J6UH326VPVQG1',contactName:'Razmik Hovakimyan',phone:'+374 98 459567',email:'razmik.hovakimyan@gmail.com',telegram:'https://t.me/rzmk_design'},
  sections:[
    {id:1,name:'Visual Identity',total:1200000,payments:[
      {id:1,label:'Pre-payment 30%',pct:30,status:'No Status'},
      {id:2,label:'Mid-payment 30%',pct:30,status:'Processing'},
      {id:3,label:'Post-payment 40%',pct:40,status:'No Status'}
    ]},
    {id:2,name:'Website',total:0,payments:[
      {id:1,label:'Pre-payment 50%',pct:50,status:'No Status'},
      {id:2,label:'Post-payment 50%',pct:50,status:'No Status'}
    ]}
  ]
}]};

var db=load();
if(!db||!db.projects)db=JSON.parse(JSON.stringify(DEF));
db.projects.forEach(function(p){
  if(!p.sections)p.sections=[];
  if(!p.communication)p.communication={whatsapp:'',contactName:'',phone:'',email:'',telegram:''};
  if(!p.slug)p.slug=toSlug(p.client)+'-'+p.id;
  if(!p.links)p.links=[{id:1,label:'Payment Tracker',sub:'Payment processing and steps',url:'#pay'}];
  if(!p.description)p.description='';
});

var view='login';
var editingId=null;
var clientSlug=null;
var modal=null;
var newPrj={client:'',slug:''};
var merr='';
var loginPass='';
var loginErr='';

function toSlug(s){return s.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');}
function fmt(n){return Number(n||0).toLocaleString('ru-RU')+' AMD';}
function uid(){return Date.now()+Math.floor(Math.random()*999);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

function chevron(white){var c=white?'rgba(255,255,255,.7)':'#b4b4b4';return '<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M2 3l2 2 2-2" stroke="'+c+'" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function statusPill(status,editable,pid,sid,pmid){
  var cls=status==='Paid'?'sp-paid':status==='Processing'?'sp-processing':'sp-none';
  var onclick=editable?' onclick="cycleStatus('+pid+','+sid+','+pmid+')"':'';
  return '<div class="sp '+cls+'"'+onclick+'><span>'+esc(status)+'</span>'+chevron(status==='Paid')+'</div>';
}
function copyIcon(){return '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 1H3a1 1 0 00-1 1v7" stroke="#3f3f3f" stroke-width="1.1" stroke-linecap="round"/><rect x="4" y="3" width="7" height="8" rx="1" stroke="#3f3f3f" stroke-width="1.1"/></svg>';}

function cycleStatus(pid,sid,pmid){
  var p=db.projects.find(function(x){return x.id==pid;});
  var s=p.sections.find(function(x){return x.id==sid;});
  var pm=s.payments.find(function(x){return x.id==pmid;});
  var order=['No Status','Processing','Paid'];
  pm.status=order[(order.indexOf(pm.status)+1)%3];
  save(db);render();
}

function initRoute(){
  var hash=window.location.hash;
  if(hash==='#admin'){view=isAuthed()?'admin':'login';return;}
  if(hash.startsWith('#editor-')&&isAuthed()){editingId=parseInt(hash.replace('#editor-',''));view='editor';return;}
  if(hash.startsWith('#client:')){var slug=hash.replace('#client:','');var p=db.projects.find(function(x){return x.slug===slug;});if(p){clientSlug=slug;view='client';return;}}
  if(hash.startsWith('#pay:')){var slug2=hash.replace('#pay:','');var p2=db.projects.find(function(x){return x.slug===slug2;});if(p2){clientSlug=slug2;view='pay';return;}}
  view=isAuthed()?'admin':'login';
}

function goAdmin(){if(!isAuthed()){view='login';loginPass='';loginErr='';render();return;}view='admin';window.location.hash='admin';render();}
function goEditor(id){if(!isAuthed()){goAdmin();return;}view='editor';editingId=parseInt(id);window.location.hash='editor-'+id;render();}
function goClient(slug){view='client';clientSlug=slug;window.location.hash='client:'+slug;render();}
function goPay(slug){view='pay';clientSlug=slug;window.location.hash='pay:'+slug;render();}
function goList(){view=isAuthed()?'admin':'login';window.location.hash=isAuthed()?'admin':'';render();}
function goLogin(){if(isAuthed()){goAdmin();return;}loginPass='';loginErr='';view='login';render();setTimeout(function(){var el=document.getElementById('lpass');if(el)el.focus();},50);}
function doLogin(){if(loginPass===PASS){setAuth();loginPass='';loginErr='';view='admin';window.location.hash='admin';render();}else{loginErr='Неверный пароль';render();setTimeout(function(){var el=document.getElementById('lpass');if(el)el.focus();},50);}}
function doLogout(){clearAuth();view='login';window.location.hash='';render();}

function copyLink(pid){
  var p=db.projects.find(function(x){return x.id==pid;});
  var link=BASE+'/#client:'+p.slug;
  if(navigator.clipboard){navigator.clipboard.writeText(link).then(function(){showToast('Ссылка скопирована!');});}
  else{var ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Ссылка скопирована!');}
}

function openNew(){if(!isAuthed()){goLogin();return;}modal='new';newPrj={client:'',slug:''};merr='';render();}
function closeModal(){modal=null;render();}
function createProject(){
  if(!newPrj.client.trim()){merr='Введите имя клиента';render();return;}
  var autoSlug=newPrj.slug.trim()||toSlug(newPrj.client);
  if(!autoSlug){merr='Не удалось создать URL';render();return;}
  if(db.projects.find(function(x){return x.slug===autoSlug;})){merr='Такой URL уже занят';render();return;}
  var id=uid();
  db.projects.push({id:id,client:newPrj.client.trim(),slug:autoSlug,description:'',
    links:[{id:1,label:'Payment Tracker',sub:'Payment processing and steps',url:'#pay'}],
    communication:{whatsapp:'',contactName:'',phone:'',email:'',telegram:''},
    sections:[{id:1,name:'Новая секция',total:0,payments:[
      {id:1,label:'Pre-payment 50%',pct:50,status:'No Status'},
      {id:2,label:'Post-payment 50%',pct:50,status:'No Status'}
    ]}]});
  save(db);modal=null;goEditor(id);
}
function deleteProject(id){if(!confirm('Удалить проект?'))return;db.projects=db.projects.filter(function(x){return x.id!=id;});save(db);goAdmin();}
function updProj(pid,f,v){var p=db.projects.find(function(x){return x.id==pid;});if(p)p[f]=v;save(db);}
function updSlug(pid,v){var p=db.projects.find(function(x){return x.id==pid;});if(!p)return;var s=toSlug(v);if(db.projects.find(function(x){return x.id!=pid&&x.slug===s;})){showToast('URL уже занят');return;}p.slug=s;save(db);render();}
function addSection(pid){var p=db.projects.find(function(x){return x.id==pid;});p.sections.push({id:uid(),name:'Новая секция',total:0,payments:[{id:1,label:'Pre-payment 50%',pct:50,status:'No Status'},{id:2,label:'Post-payment 50%',pct:50,status:'No Status'}]});save(db);render();}
function removeSection(pid,sid){var p=db.projects.find(function(x){return x.id==pid;});if(p.sections.length<=1)return;p.sections=p.sections.filter(function(x){return x.id!=sid;});save(db);render();}
function addPayment(pid,sid){var s=db.projects.find(function(x){return x.id==pid;}).sections.find(function(x){return x.id==sid;});s.payments.push({id:uid(),label:'Новый этап',pct:0,status:'No Status'});save(db);render();}
function removePayment(pid,sid,pmid){var s=db.projects.find(function(x){return x.id==pid;}).sections.find(function(x){return x.id==sid;});if(s.payments.length<=1)return;s.payments=s.payments.filter(function(x){return x.id!=pmid;});save(db);render();}
function updSec(pid,sid,f,v){var s=db.projects.find(function(x){return x.id==pid;}).sections.find(function(x){return x.id==sid;});if(s)s[f]=f==='total'?parseFloat(v)||0:v;save(db);}
function updPm(pid,sid,pmid,f,v){var s=db.projects.find(function(x){return x.id==pid;}).sections.find(function(x){return x.id==sid;});var pm=s.payments.find(function(x){return x.id==pmid;});if(pm)pm[f]=f==='pct'?parseFloat(v)||0:v;save(db);}
function addLink(pid){var p=db.projects.find(function(x){return x.id==pid;});p.links.push({id:uid(),label:'',sub:'',url:''});save(db);render();}
function removeLink(pid,lid){var p=db.projects.find(function(x){return x.id==pid;});p.links=p.links.filter(function(x){return x.id!=lid;});save(db);render();}
function updLink(pid,lid,f,v){var p=db.projects.find(function(x){return x.id==pid;});var l=p.links.find(function(x){return x.id==lid;});if(l)l[f]=v;save(db);}

      '</div>'+
      '<div class="ad-field" style="margin-bottom:10px"><div class="ad-label">Сумма (AMD)</div><input class="ad-input-sm" type="number" value="'+esc(sec.total||0)+'" oninput="updSec('+p.id+','+sec.id+',\'total\',this.value)"></div>'+
      '<div style="font-size:10px;color:#b4b4b4;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px">Этапы</div>';
    sec.payments.forEach(function(pm){
      var amt=Math.round((sec.total||0)*pm.pct/100);
      h+='<div class="pay-item">'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<input class="ad-input-sm" style="flex:1" type="text" value="'+esc(pm.label)+'" oninput="updPm('+p.id+','+sec.id+','+pm.id+',\'label\',this.value)">'+
          '<button class="del-btn" onclick="removePayment('+p.id+','+sec.id+','+pm.id+')">×</button>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:70px 1fr auto;gap:10px;align-items:center">'+
          '<div><div class="ad-label">%</div><input class="ad-input-sm" type="number" value="'+pm.pct+'" oninput="updPm('+p.id+','+sec.id+','+pm.id+',\'pct\',this.value)" style="width:55px"></div>'+
          '<div style="font-size:11px;color:#b4b4b4">'+fmt(amt)+'</div>'+
          '<div>'+statusPill(pm.status,true,p.id,sec.id,pm.id)+'</div>'+
        '</div>'+
      '</div>';
    });
    h+='<button class="add-link-btn" onclick="addPayment('+p.id+','+sec.id+')">+ этап</button></div>';
  });
  h+='<button class="add-link-btn" style="margin-top:4px" onclick="addSection('+p.id+')">+ секция</button></div>'+
  '<button class="del-proj-btn" onclick="deleteProject('+p.id+')">Удалить проект</button>'+
  '<div style="height:40px"></div></div></div>';
  return h;
}

function render(){
  var el=document.getElementById('app');
  if(!el)return;
  var h='';
  if(view==='login')h=renderLogin();
  else if(view==='list')h=renderList();
  else if(view==='client')h=renderClient();
  else if(view==='pay')h=renderPay();
  else if(view==='admin'&&isAuthed())h=renderAdmin();
  else if(view==='editor'&&isAuthed())h=renderEditor();
  else h=renderLogin();
  el.innerHTML=h;
  el.style.background='';
}

window.addEventListener('hashchange',function(){initRoute();render();});
window.addEventListener('load',function(){
  initRoute();
  render();
  if(view==='login')setTimeout(function(){var el=document.getElementById('lpass');if(el)el.focus();},50);
});
</script>
</body>
</html>
