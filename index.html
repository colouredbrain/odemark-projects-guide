<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>ödemark — Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#6b6b6b;
  --color-text-tertiary:#9b9b9b;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f4f0;
  --color-background-tertiary:#eaeef1;
  --color-border-tertiary:rgba(0,0,0,0.1);
  --color-border-secondary:rgba(0,0,0,0.2);
  --font-sans:'DM Sans',sans-serif;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',sans-serif;background:#fff;min-height:100vh}

/* ── SHARED ── */
.pill{display:inline-flex;align-self:flex-start;align-items:center;border-radius:50px;padding:4px 12px;font-size:10px;font-weight:600;color:#3f3f3f;letter-spacing:-.1px;white-space:nowrap;width:fit-content}
.pill-gray{background:#eaeef1}
.pill-white{background:#fff}
a{color:inherit;text-decoration:none}
a.ul{text-decoration:underline}

/* ── PROJECT LIST (public, no auth) ── */
.pl{min-height:100vh;background:#f4f4f0}
.pl-topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;background:#fff;border-bottom:.5px solid #e8e8e8}
.pl-logo{font-size:22px;font-weight:300;color:#3f3f3f;letter-spacing:-.5px}
.pl-dots{display:flex;gap:5px;cursor:pointer}
.pl-dot{width:14px;height:14px;border-radius:50%;background:#3f3f3f}
.pl-sq{width:14px;height:14px;background:#3f3f3f}
.pl-body{padding:32px 24px;max-width:900px;margin:0 auto}
.pl-heading{font-size:13px;font-weight:600;color:#b4b4b4;letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px}
.pl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.pl-card{background:#fff;border-radius:12px;border:.5px solid #e0e0e0;padding:20px 22px;cursor:pointer;transition:border-color .2s,box-shadow .2s;text-decoration:none;display:block}
.pl-card:hover{border-color:#3f3f3f;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.pl-card-name{font-size:17px;font-weight:400;color:#3f3f3f;letter-spacing:-.17px;margin-bottom:6px}
.pl-card-slug{font-size:11px;color:#b4b4b4;margin-bottom:14px}
.pl-card-badges{display:flex;gap:6px;flex-wrap:wrap}
.pl-card-badge{font-size:9px;background:#eaeef1;border-radius:50px;padding:2px 9px;color:#3f3f3f}
.pl-empty{font-size:13px;color:#b4b4b4;text-align:center;padding:60px 0}

/* ── CLIENT LANDING ── */
/* Mobile-first, responsive at 768px */
.cl{background:#fff;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.cl-hero{background:#eaeef1;padding:24px 16px 40px}
.cl-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:56px}
.cl-nav-logo{font-size:22px;font-weight:300;color:#3f3f3f;letter-spacing:-.5px}
.cl-nav-dots{display:flex;gap:5px;cursor:pointer}
.cl-nav-dot{width:14px;height:14px;border-radius:50%;background:#3f3f3f}
.cl-nav-sq{width:14px;height:14px;background:#3f3f3f}
.cl-hero-body{display:flex;flex-direction:column;gap:30px}
.cl-hero-left{display:flex;flex-direction:column;gap:15px}
.cl-hero-title{font-size:36px;font-weight:300;color:#3f3f3f;line-height:1;letter-spacing:-.36px}
.cl-hero-desc{font-size:15px;color:#3f3f3f;line-height:1.5;letter-spacing:-.15px}
.cl-hero-right{display:flex;flex-direction:column;gap:18px}
.cl-project-name{font-size:36px;font-weight:300;color:#3f3f3f;line-height:1;letter-spacing:-.36px}

/* Links section */
.cl-links{padding:30px 16px;flex:1}
.cl-links-grid{display:flex;flex-direction:column;gap:30px;margin-top:30px}
.cl-link-item{display:flex;gap:4px;align-items:flex-start}
.cl-link-arrow{font-size:16px;color:#3f3f3f;flex-shrink:0;line-height:1.3}
.cl-link-name{font-size:16px;color:#3f3f3f;letter-spacing:-.16px;line-height:1.3;text-decoration:underline;cursor:pointer}
.cl-link-name:not([href]){text-decoration:none;cursor:default}
.cl-link-sub{font-size:12px;color:#b4b4b4;letter-spacing:-.12px;margin-top:2px}

/* Communication */
.cl-comm{background:#eaeef1;padding:30px 16px 60px}
.cl-comm-grid{display:flex;flex-direction:column;gap:30px;margin-top:20px}
.cl-comm-col-title{font-size:10px;font-weight:700;color:#3f3f3f;letter-spacing:-.1px;margin-bottom:15px}
.cl-comm-link{font-size:16px;color:#3f3f3f;text-decoration:underline;letter-spacing:-.16px;display:block}
.cl-comm-sub{font-size:9px;color:#b4b4b4;margin-top:2px}
.cl-contact-name{font-size:16px;color:#3f3f3f;letter-spacing:-.16px;line-height:1.3;margin-bottom:15px}
.cl-contact-links{display:flex;flex-direction:column;gap:6px;font-size:16px;color:#3f3f3f;letter-spacing:-.16px}
.cl-contact-links a{color:#3f3f3f;text-decoration:underline}

/* Footer */
.cl-footer{background:#3f3f3f;padding:24px 16px}
.cl-footer-copy{font-size:12px;color:#eaeef1}

/* Payment tracker link in landing */
.cl-pay-btn{display:inline-flex;align-items:center;gap:6px;background:#3f3f3f;color:#fff;border-radius:50px;padding:8px 16px;font-size:13px;text-decoration:none;margin-top:8px}
.cl-pay-btn:hover{background:#2a2a2a}

/* Desktop overrides */
@media(min-width:768px){
  .cl-hero{padding:24px 24px 48px}
  .cl-hero-body{flex-direction:row;gap:30px;align-items:flex-start}
  .cl-hero-left{flex:1}
  .cl-hero-right{flex:1}
  .cl-links{padding:30px 24px;flex:1}
  .cl-links-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:30px}
  .cl-comm{padding:30px 24px 60px}
  .cl-comm-grid{flex-direction:row;gap:30px}
  .cl-comm-grid > div{flex:1}
  .cl-footer{padding:24px}
}

.pt-total-label{font-size:10px;color:#3f3f3f;letter-spacing:-.1px;margin-bottom:6px;text-align:right}
.pt-total-amt{font-size:16px;color:#3f3f3f;letter-spacing:-.16px;text-align:right}
.pt-table-hdr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:5px 0;font-size:10px;color:#b4b4b4;letter-spacing:-.1px}
.pt-rows{display:flex;flex-direction:column;gap:12px;padding:12px 0 0}
.pt-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:center}

.pt-comm{background:#eaeef1;padding:20px;display:flex;flex-direction:column;gap:18px}

.pt-comm-title{font-size:6px;font-weight:700;color:#3f3f3f;letter-spacing:-.06px;margin-bottom:12px}
.pt-comm-link{font-size:12px;color:#3f3f3f;text-decoration:underline;display:block;margin-bottom:2px}
.pt-comm-sub{font-size:9px;color:#b4b4b4}
.pt-contact-name{font-size:12px;color:#3f3f3f;line-height:1.3;margin-bottom:12px}
.pt-contact-links{display:flex;flex-direction:column;gap:5px;font-size:9px;color:#3f3f3f}

/* ── ADMIN ── */

.ad-topbar{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid #e0e0e0;position:sticky;top:0;z-index:10}

.link-display{font-size:10px;color:#3f3f3f;word-break:break-all;line-height:1.6;background:#fff3e0;border-radius:6px;padding:7px 9px;font-family:monospace;margin-bottom:8px}

/* ── LOGIN ── */

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const BASE = 'https://project.tracker.odemark.co';
const SK = 'ch_v7';
const PASS = 'odemark2025';
const AUTH_KEY = 'ch_auth';

function load(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch{return null;}}
function saveLocal(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function isAuthed(){return localStorage.getItem(AUTH_KEY)==='1';}
function setAuth(){localStorage.setItem(AUTH_KEY,'1');}
function clearAuth(){localStorage.removeItem(AUTH_KEY);}

// API functions
async function loadFromServer(){
  try{
    const r=await fetch('/api/data');
    if(!r.ok) return null;
    const d=await r.json();
    if(d&&d.projects){saveLocal(d);return d;}
    return null;
  }catch(e){return null;}
}
async function saveToServer(d){
  try{
    saveLocal(d);
    const r=await fetch('/api/data',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Admin-Pass':PASS},
      body:JSON.stringify(d)
    });
    return r.ok;
  }catch(e){saveLocal(d);return false;}
}
function save(d){
  saveLocal(d);
  saveToServer(d).then(ok=>{if(!ok)console.warn('Server save failed, data saved locally');});
}

/* DEFAULT DATA */
const DEF = {projects:[{
  id:1, client:'Caucasus Holidays', slug:'caucasus-holidays',
  description:'This page will help you navigate through our collaboration.\nBelow you\'ll find all the key links and resources needed for the project.',
  links:[
    {id:1,label:'Figma Project File',sub:'Presentations and steps.',url:''},
    {id:2,label:'Legal Documents',sub:'Contracts, invoices.',url:''},
    {id:3,label:'Google Drive Folder',sub:'Deliverables & Assets',url:''},
    {id:4,label:'Payment Tracker',sub:'Payment processing and steps',url:'#pay'},
    {id:5,label:'Provided Materials',sub:'Briefs, photos, assets',url:''}
  ],
  communication:{
    whatsapp:'https://wa.me/qr/6J6UH326VPVQG1',
    contactName:'Razmik Hovakimyan',
    phone:'+374 98 459567',
    email:'razmik.hovakimyan@gmail.com',
    telegram:'https://t.me/rzmk_design'
  },
  sections:[
    {id:1,name:'Visual Identity',total:1200000,payments:[
      {id:1,label:'Pre-payment 30%',pct:30,status:'No Status'},
      {id:2,label:'Mid-payment 30%',pct:30,status:'Processing'},
      {id:3,label:'Post-payment 40%',pct:40,status:'No Status'}
    ]},
    {id:2,name:'Website',total:0,payments:[
      {id:1,label:'Pre-payment 50%',pct:50,status:'No Status'},
      {id:2,label:'Post-payment 50%',pct:50,status:'No Status'}
    ]}
  ]
}]};

let db = load();
if(!db||!db.projects) db = JSON.parse(JSON.stringify(DEF));
// migrations
db.projects.forEach(p=>{
  if(!p.sections) p.sections=[];
  if(!p.communication) p.communication={whatsapp:'',contactName:'',phone:'',email:'',telegram:''};
  if(!p.slug) p.slug=toSlug(p.client)+'-'+p.id;
  if(!p.links) p.links=[{id:1,label:'Payment Tracker',sub:'Payment processing and steps',url:'#pay'}];
  if(!p.description) p.description='';
});

/* STATE */
let view = 'list';   // list | client | pay | admin | editor | login
let editingId = null;
let clientSlug = null;
let modal = null;
let newPrj = {client:'',slug:''};
let merr = '';
let loginPass = '';
let loginErr = '';

/* HELPERS */
function toSlug(s){return s.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');}
function fmt(n){return Number(n||0).toLocaleString('ru-RU')+' AMD';}
function uid(){return Date.now()+Math.floor(Math.random()*999);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function chevron(white){
  const c=white?'rgba(255,255,255,.7)':'#b4b4b4';
  return `<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M2 3l2 2 2-2" stroke="${c}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function statusPill(status,editable,pid,sid,pmid){
  const cls=status==='Paid'?'sp-paid':status==='Processing'?'sp-processing':'sp-none';
  const attrs=editable?`onclick="cycleStatus(${pid},${sid},${pmid})"`:'' ;
  return `<div class="sp ${cls}" ${attrs}><span>${esc(status)}</span>${chevron(status==='Paid')}</div>`;
}
function copyIcon(){return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 1H3a1 1 0 00-1 1v7" stroke="#3f3f3f" stroke-width="1.1" stroke-linecap="round"/><rect x="4" y="3" width="7" height="8" rx="1" stroke="#3f3f3f" stroke-width="1.1"/></svg>`;}

/* ROUTING */
function getPath(){
  const h=window.location.hash;
  const p=window.location.pathname.replace(/^\/+/,'').replace(/\/+$/,'');
  return {path:p, hash:h};
}

function initRoute(){
  const hash=window.location.hash;
  if(hash==='#admin'){view=isAuthed()?'admin':'login';return;}
  if(hash.startsWith('#editor-')&&isAuthed()){
    editingId=parseInt(hash.replace('#editor-',''));
    view='editor';return;
  }
  // slug-based client view (for when deployed)
  if(hash.startsWith('#client:')){
    const slug=hash.replace('#client:','');
    const p=db.projects.find(x=>x.slug===slug);
    if(p){clientSlug=slug;view='client';return;}
  }
  if(hash.startsWith('#pay:')){
    const slug=hash.replace('#pay:','');
    const p=db.projects.find(x=>x.slug===slug);
    if(p){clientSlug=slug;view='pay';return;}
  }
  // default: login
  view=isAuthed()?'admin':'login';
}

/* NAV */
function goList(){view='list';render();}
function goClient(slug){view='client';clientSlug=slug;window.location.hash='client:'+slug;render();}
function goPay(slug){view='pay';clientSlug=slug;window.location.hash='pay:'+slug;render();}
function goAdmin(){
  if(!isAuthed()){view='login';loginPass='';loginErr='';render();return;}
  view='admin';render();
}
function goEditor(id){
  if(!isAuthed()){goAdmin();return;}
  view='editor';editingId=parseInt(id);render();
}
function goLogin(fromDots){
  if(isAuthed()){goAdmin();return;}
  loginPass='';loginErr='';view='login';render();
  setTimeout(()=>{const el=document.getElementById('lpass');if(el)el.focus();},50);
}
function doLogin(){
  if(loginPass===PASS){setAuth();loginPass='';loginErr='';view='admin';render();}
  else{loginErr='Неверный пароль';render();setTimeout(()=>{const el=document.getElementById('lpass');if(el)el.focus();},50);}
}
function doLogout(){clearAuth();view='login';render();}

/* COPY */
function copyLink(pid){
  const p=db.projects.find(x=>x.id==pid);
  const link=BASE+'/#client:'+p.slug;
  navigator.clipboard?navigator.clipboard.writeText(link).then(()=>showToast('Ссылка скопирована!')):fallbackCopy(link);
}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Ссылка скопирована!');}

/* STATUS */
function cycleStatus(pid,sid,pmid){
  const s=db.projects.find(x=>x.id==pid).sections.find(x=>x.id==sid);
  const pm=s.payments.find(x=>x.id==pmid);
  const order=['No Status','Processing','Paid'];
  pm.status=order[(order.indexOf(pm.status)+1)%3];
  save(db);render();
}

/* MODAL */
function openNew(){
  if(!isAuthed()){goLogin();return;}
  modal='new';newPrj={client:'',slug:''};merr='';render();
}
function closeModal(e){if(!e||e.target===e.currentTarget||e===undefined){modal=null;render();}}
function createProject(){
  if(!newPrj.client.trim()){merr='Введите имя клиента';render();return;}
  const autoSlug=newPrj.slug.trim()||toSlug(newPrj.client);
  if(!autoSlug){merr='Не удалось создать URL';render();return;}
  if(db.projects.find(x=>x.slug===autoSlug)){merr='Такой URL уже занят';render();return;}
  const id=uid();
  db.projects.push({id,client:newPrj.client.trim(),slug:autoSlug,description:'',
    links:[{id:1,label:'Payment Tracker',sub:'Payment processing and steps',url:'#pay'}],
    communication:{whatsapp:'',contactName:'',phone:'',email:'',telegram:''},
    sections:[{id:1,name:'Новая секция',total:0,payments:[
      {id:1,label:'Pre-payment 50%',pct:50,status:'No Status'},
      {id:2,label:'Post-payment 50%',pct:50,status:'No Status'}
    ]}]});
  save(db);modal=null;goEditor(id);
}
function deleteProject(id){if(!confirm('Удалить проект?'))return;db.projects=db.projects.filter(x=>x.id!=id);save(db);goAdmin();}

/* CRUD helpers */
function updProj(pid,f,v){const p=db.projects.find(x=>x.id==pid);if(p)p[f]=v;save(db);}
function updSlug(pid,v){
  const p=db.projects.find(x=>x.id==pid);if(!p)return;
  const s=toSlug(v);
  if(db.projects.find(x=>x.id!=pid&&x.slug===s)){showToast('URL уже занят');return;}
  p.slug=s;save(db);render();
}
function updComm(pid,f,v){const p=db.projects.find(x=>x.id==pid);if(p)p.communication[f]=v;save(db);}
function updSec(pid,sid,f,v){const s=db.projects.find(x=>x.id==pid).sections.find(x=>x.id==sid);if(s)s[f]=f==='total'?parseFloat(v)||0:v;save(db);}
function updPm(pid,sid,pmid,f,v){const s=db.projects.find(x=>x.id==pid).sections.find(x=>x.id==sid);const pm=s.payments.find(x=>x.id==pmid);if(pm)pm[f]=f==='pct'?parseFloat(v)||0:v;save(db);}
function addSection(pid){const p=db.projects.find(x=>x.id==pid);p.sections.push({id:uid(),name:'Новая секция',total:0,payments:[{id:1,label:'Pre-payment 50%',pct:50,status:'No Status'},{id:2,label:'Post-payment 50%',pct:50,status:'No Status'}]});save(db);render();}
function removeSection(pid,sid){const p=db.projects.find(x=>x.id==pid);if(p.sections.length<=1)return;p.sections=p.sections.filter(x=>x.id!=sid);save(db);render();}
function addPayment(pid,sid){const s=db.projects.find(x=>x.id==pid).sections.find(x=>x.id==sid);s.payments.push({id:uid(),label:'Новый этап',pct:0,status:'No Status'});save(db);render();}
function removePayment(pid,sid,pmid){const s=db.projects.find(x=>x.id==pid).sections.find(x=>x.id==sid);if(s.payments.length<=1)return;s.payments=s.payments.filter(x=>x.id!=pmid);save(db);render();}
// links
function addLink(pid){const p=db.projects.find(x=>x.id==pid);p.links.push({id:uid(),label:'',sub:'',url:''});save(db);render();}
function removeLink(pid,lid){const p=db.projects.find(x=>x.id==pid);p.links=p.links.filter(x=>x.id!=lid);save(db);render();}
function updLink(pid,lid,f,v){const p=db.projects.find(x=>x.id==pid);const l=p.links.find(x=>x.id==lid);if(l)l[f]=v;save(db);}

      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="ad-preview-btn" onclick="goClient('${esc(p.slug)}')">👁 Лендинг</button>
        <button class="ad-preview-btn" onclick="goPay('${esc(p.slug)}')">💳 Трекер</button>
      </div>
    </div>
    <div class="ad-body">

      <!-- PROJECT INFO -->
      <div class="ad-card">
        <div class="ad-card-title">Проект</div>
        <div class="ad-field"><div class="ad-label">Имя клиента</div>
          <input class="ad-input" type="text" value="${esc(p.client)}" oninput="updProj(${p.id},'client',this.value)"></div>
        <div class="ad-field"><div class="ad-label">URL</div>
          <div class="ad-slug-row">
            <span class="ad-slug-prefix">${esc(BASE)}/</span>
            <input class="ad-slug-inp" type="text" value="${esc(p.slug)}" onchange="updSlug(${p.id},this.value)">
          </div>
        </div>
        <div class="ad-field"><div class="ad-label">Описание (подзаголовок лендинга)</div>
          <textarea class="ad-textarea" rows="3" oninput="updProj(${p.id},'description',this.value)">${esc(p.description||'')}</textarea>
        </div>
      </div>

      <!-- CLIENT LINK -->
      <div class="link-card">
        <div class="link-card-title">Ссылка для клиента</div>
        <div class="link-display">${esc(BASE+'/#client:'+p.slug)}</div>
        <button class="copy-btn" onclick="copyLink(${p.id})">${copyIcon()} Скопировать ссылку</button>
      </div>

      <!-- USEFUL LINKS -->
      <div class="ad-card">
        <div class="ad-card-title">Ссылки (лендинг)</div>`;
  for(const lnk of (p.links||[])){
    h+=`<div class="link-item-row">
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <input class="ad-input-sm" type="text" placeholder="Название ссылки" value="${esc(lnk.label)}" oninput="updLink(${p.id},${lnk.id},'label',this.value)">
        <input class="ad-input-sm" type="text" placeholder="Подпись" value="${esc(lnk.sub)}" oninput="updLink(${p.id},${lnk.id},'sub',this.value)">
        <input class="ad-input-sm" type="text" placeholder="URL (или #pay для трекера)" value="${esc(lnk.url)}" oninput="updLink(${p.id},${lnk.id},'url',this.value)">
      </div>
      <button class="del-btn" onclick="removeLink(${p.id},${lnk.id})">×</button>
    </div>`;
  }
  h+=`<button class="add-link-btn" onclick="addLink(${p.id})">+ добавить ссылку</button>
      </div>

      <!-- PAYMENT SECTIONS -->
      <div class="ad-card">
        <div class="ad-card-title">Секции оплаты</div>`;
  for(const sec of p.sections){
    h+=`<div class="sec-block">
      <div class="sec-block-hdr">
        <input class="ad-input-sm" style="font-weight:500;font-size:12px" type="text" value="${esc(sec.name)}" oninput="updSec(${p.id},${sec.id},'name',this.value)">
        <button class="del-btn" onclick="removeSection(${p.id},${sec.id})">×</button>
      </div>
      <div class="ad-field" style="margin-bottom:10px">
        <div class="ad-label">Общая сумма (AMD)</div>
        <input class="ad-input-sm" type="number" value="${sec.total||0}" oninput="updSec(${p.id},${sec.id},'total',this.value)">
      </div>
      <div style="font-size:10px;color:#b4b4b4;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px">Этапы</div>`;
    for(const pm of sec.payments){
      const amt=Math.round((sec.total||0)*pm.pct/100);
      h+=`<div class="pay-item">
        <div style="display:flex;align-items:center;gap:8px">
          <input class="ad-input-sm" style="flex:1" type="text" value="${esc(pm.label)}" oninput="updPm(${p.id},${sec.id},${pm.id},'label',this.value)">
          <button class="del-btn" onclick="removePayment(${p.id},${sec.id},${pm.id})">×</button>
        </div>
        <div style="display:grid;grid-template-columns:70px 1fr auto;gap:10px;align-items:center">
          <div><div class="ad-label">%</div><input class="ad-input-sm" type="number" value="${pm.pct}" oninput="updPm(${p.id},${sec.id},${pm.id},'pct',this.value)" style="width:55px"></div>
          <div style="font-size:11px;color:#b4b4b4">${fmt(amt)}</div>
          <div>${statusPill(pm.status,true,p.id,sec.id,pm.id)}</div>
        </div>
      </div>`;
    }
    h+=`<button class="add-link-btn" onclick="addPayment(${p.id},${sec.id})">+ этап</button></div>`;
  }
  h+=`<button class="add-link-btn" style="margin-top:4px" onclick="addSection(${p.id})">+ секция</button>
      </div>



      <button class="del-proj-btn" onclick="deleteProject(${p.id})">Удалить проект</button>
      <div style="height:40px"></div>
    </div>
  </div>`;
  return h;
}

/* ── MAIN RENDER ── */
function render(){
  let h='';
  if(view==='login') h=renderLogin();
  else if(view==='list') h=renderList();
  else if(view==='client') h=renderClient();
  else if(view==='pay') h=renderPay();
  else if(view==='admin'&&isAuthed()) h=renderAdmin();
  else if(view==='editor'&&isAuthed()) h=renderEditor();
  else if(view==='admin'||view==='editor'){loginPass='';loginErr='';h=renderLogin();}
  else h=renderList();
  document.getElementById('app').innerHTML=h;
}

document.addEventListener('DOMContentLoaded', async function(){
  try{
    // show login/skeleton immediately
    initRoute();
    render();
    if(view==='login') setTimeout(()=>{const el=document.getElementById('lpass');if(el)el.focus();},50);

    // load fresh data from server in background
    const serverData = await loadFromServer();
    if(serverData){
      db = serverData;
      db.projects.forEach(p=>{
        if(!p.sections) p.sections=[];
        if(!p.communication) p.communication={whatsapp:'',contactName:'',phone:'',email:'',telegram:''};
        if(!p.slug) p.slug=toSlug(p.client)+'-'+p.id;
        if(!p.links) p.links=[{id:1,label:'Payment Tracker',sub:'Payment processing and steps',url:'#pay'}];
        if(!p.description) p.description='';
      });
      render(); // re-render with fresh data
    }
  }catch(e){
    document.getElementById('app').innerHTML='<div style="padding:40px;font-family:sans-serif;color:#333"><h2>Error</h2><pre>'+e.message+'</pre></div>';
    console.error(e);
  }
});
window.addEventListener('popstate',()=>{initRoute();render();if(view==='login')setTimeout(()=>{const el=document.getElementById('lpass');if(el)el.focus();},50);});
</script>
</body>
</html>
